<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Welcome to Digital JD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #040608;
      --navy: #07131a;
      --cyan: #00b4d8;
      --cyan-bright: #00e5ff;
      --gold: #c9a84c;
      --white: #f0f4f8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow Condensed', sans-serif;
      background: linear-gradient(135deg, var(--black) 0%, var(--navy) 100%);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 3rem 2rem;
      text-align: center;
    }
    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--cyan-bright));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
    }
    .checkmark svg {
      width: 40px;
      height: 40px;
      stroke: var(--black);
      stroke-width: 3;
      fill: none;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--white);
    }
    .subtitle {
      font-size: 1.2rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
    }
    .description {
      font-size: 1.1rem;
      line-height: 1.6;
      color: rgba(240, 244, 248, 0.8);
      margin-bottom: 2rem;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }
    .btn-primary {
      display: inline-block;
      background: linear-gradient(135deg, var(--cyan), var(--cyan-bright));
      color: var(--black);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 1rem 2.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 229, 255, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 229, 255, 0.5);
    }
    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-decoration: none;
      padding: 0.8rem 2rem;
      border: 1px solid var(--gold);
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .btn-secondary:hover {
      background: var(--gold);
      color: var(--black);
    }
    .note {
      margin-top: 2rem;
      font-size: 0.9rem;
      color: rgba(240, 244, 248, 0.6);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <h1>Welcome to Digital JD</h1>
    <p class="subtitle">Your Executive Intelligence Awaits</p>
    <p class="description">Thanks for subscribing. A receipt is on its way to your inbox, and your account is now active.</p>
    
    <div class="btn-group">
      <a href="https://digitaljd.org/jd-demo.php" class="btn-primary">Access Digital JD</a>
      <a href="https://billing.stripe.com/p/login/3cI14mgxr1au4ks2bRdEs00" target="_blank" class="btn-secondary">Manage Subscription</a>
      <a href="/" class="btn-secondary">Back to Home</a>
    </div>
    
    <p class="note">Need help? Contact us at <a href="mailto:drjd@digitaljd.org" style="color:var(--cyan);">drjd@digitaljd.org</a></p>
  </div>
</body>
</html>
